name: ai_agent_client
description: AI Agent Client — voice/text agent with background execution
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Env / config
  flutter_dotenv: ^5.2.1

  # Unique IDs (requestId generation in text mode)
  uuid: ^4.5.1

  # HTTP
  http: ^1.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Audio playback & recording
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  record: ^6.0.0
  audio_waveforms: ^1.3.0

  # Persistence
  shared_preferences: ^2.3.4

  # Networking (auth/meeting api)
  dio: ^5.8.0+1

  # Date/number formatting
  intl: ^0.20.2

  # Device fingerprint for login (phonemodel / phonemac)
  device_info_plus: ^11.5.0

  # 腾讯云对象存储（会议录音上传）
  tencentcloud_cos_sdk_plugin: ^1.2.3

  # 会议模块 UI 直接复用 deepvoice_client_liwei，需要这些库支持
  flutter_screenutil: ^5.9.0
  haptic_feedback: ^0.5.1+1
  common_utils: ^2.1.0
  lottie: ^3.3.1

  # 直接移植自 deepvoice_client_liwei 的会议模块需要这些
  get: ^4.7.2
  get_storage: ^2.1.1
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1
  markdown: ^7.1.1
  fleather: ^1.26.0
  parchment: ^1.25.1
  flutter_easyloading: ^3.0.5
  sqflite: ^2.4.2
  path: ^1.9.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.5

  # 会议详情思维导图 tab：markmap.js 跑在内嵌 WebView 里
  webview_flutter: ^4.10.0

  # Local plugins — Interface layer
  ai_plugin_interface:
    path: local_plugins/ai_plugin_interface

  # Container / management layer
  agents_server:
    path: local_plugins/agents_server
  service_manager:
    path: local_plugins/service_manager

  # Agent type plugins (register to NativeAgentRegistry on attach)
  agent_chat:
    path: local_plugins/agent_chat
  agent_sts_chat:
    path: local_plugins/agent_sts_chat
  agent_translate:
    path: local_plugins/agent_translate
  agent_ast_translate:
    path: local_plugins/agent_ast_translate

  # Service plugins (register to NativeServiceRegistry on attach)
  stt_azure:
    path: local_plugins/stt_azure
  tts_azure:
    path: local_plugins/tts_azure
  llm_openai:
    path: local_plugins/llm_openai
  llm_volcengine:
    path: local_plugins/llm_volcengine
  sts_volcengine:
    path: local_plugins/sts_volcengine
  ast_volcengine:
    path: local_plugins/ast_volcengine
  sts_polychat:
    path: local_plugins/sts_polychat
  ast_polychat:
    path: local_plugins/ast_polychat
  translation_deepl:
    path: local_plugins/translation_deepl
  translation_aliyun:
    path: local_plugins/translation_aliyun
  translation_azure:
    path: local_plugins/translation_azure

  # Device layer (hardware vendor SDK plugins)
  device_plugin_interface:
    path: local_plugins/device_plugin_interface
  device_manager:
    path: local_plugins/device_manager
  device_jieli:
    path: local_plugins/device_jieli

  # Composite scenarios (call / face-to-face / audio translation)
  translate_server:
    path: local_plugins/translate_server

  # Data layer
  local_db:
    path: local_plugins/local_db
  file_picker: ^10.3.10
  web: ^1.1.1
  web_socket_channel: ^3.0.3

  # Logging
  talker_flutter: ^4.7.5
  share_plus: ^11.1.0

  # 配置导入/导出加密（AES-CBC + PBKDF2 + HMAC-SHA256）
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^22.7.4
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14
  # 由 assets/branding/app_icon.png 生成全平台 launcher icons
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/branding/app_icon.png"
  web:
    generate: true
    image_path: "assets/branding/app_icon.png"
    background_color: "#1E88E5"
    theme_color: "#1E88E5"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/js/
