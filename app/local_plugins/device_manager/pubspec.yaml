name: device_manager
description: Container/router for hardware device plugins. MethodChannel-based facade over native DefaultNativeDeviceManager.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  device_plugin_interface:
    path: ../device_plugin_interface

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.device_manager
        pluginClass: DeviceManagerPlugin
