name: llm_openai
description: OpenAI-compatible LLM plugin with streaming and MCP tool support
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  http: ^1.3.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.llm_openai
        pluginClass: LlmOpenaiPlugin
      web:
        pluginClass: LlmOpenaiWeb
        fileName: llm_openai_web.dart
