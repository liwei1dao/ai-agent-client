name: assistant_server
description: AI Assistant orchestrator (single chat agent + headset RCSP audio loop). Native-driven; Dart side is a thin facade.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  device_plugin_interface:
    path: ../core/device_plugin_interface

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.assistant_server
        pluginClass: AssistantServerPlugin
