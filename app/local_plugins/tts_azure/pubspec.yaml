name: tts_azure
description: Azure Text-to-Speech plugin
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  http: ^1.3.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.tts_azure
        pluginClass: TtsAzurePlugin
      ios:
        pluginClass: TtsAzurePlugin
      web:
        pluginClass: TtsAzureWeb
        fileName: tts_azure_web.dart
