name: agent_translate
description: Translate agent plugin - orchestrates STT + Translation + TTS pipeline (native)
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agent_translate
        pluginClass: TranslateAgentFlutterPlugin
      web:
        pluginClass: AgentTranslateWeb
        fileName: agent_translate_web.dart
