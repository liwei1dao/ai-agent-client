name: service_manager
description: Service management and testing plugin - manages STT/TTS/LLM/STS/AST/Translation service instances
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  local_db:
    path: ../local_db
  llm_openai:
    path: ../llm_openai
  stt_azure:
    path: ../stt_azure
  tts_azure:
    path: ../tts_azure
  sts_volcengine:
    path: ../sts_volcengine
  ast_volcengine:
    path: ../ast_volcengine
  sts_polychat:
    path: ../sts_polychat
  ast_polychat:
    path: ../ast_polychat
  translation_deepl:
    path: ../translation_deepl
  translation_aliyun:
    path: ../translation_aliyun

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.service_manager
        pluginClass: ServiceManagerPlugin
      web:
        pluginClass: ServiceManagerWeb
        fileName: service_manager_web.dart
