name: service_manager
description: Service management and testing plugin - manages STT/TTS/LLM/STS/AST/Translation service instances
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  local_db:
    path: ../local_db

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.service_manager
        pluginClass: ServiceManagerPlugin
