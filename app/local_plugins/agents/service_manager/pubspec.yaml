name: service_manager
description: Service management and testing plugin - manages STT/TTS/LLM/STS/AST/Translation service instances
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  local_db: ^0.1.0
  llm_openai: ^0.1.0
  llm_volcengine: ^0.1.0
  stt_azure: ^0.1.0
  tts_azure: ^0.1.0
  sts_volcengine: ^0.1.0
  ast_volcengine: ^0.1.0
  sts_polychat: ^0.1.0
  ast_polychat: ^0.1.0
  translation_deepl: ^0.1.0
  translation_aliyun: ^0.1.0
  translation_azure: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.service_manager
        pluginClass: ServiceManagerPlugin
      web:
        pluginClass: ServiceManagerWeb
        fileName: service_manager_web.dart
