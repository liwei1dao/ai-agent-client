name: agent_ast_translate
description: AST translate agent plugin - end-to-end realtime voice translation via WebSocket (native)
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agent_ast_translate
        pluginClass: AstTranslateAgentFlutterPlugin
      ios:
        pluginClass: AstTranslateAgentFlutterPlugin
      web:
        pluginClass: AgentAstTranslateWeb
        fileName: agent_ast_translate_web.dart
