name: agents_server
description: Agent container and lifecycle manager - manages multiple native agent instances
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  local_db: ^0.1.0
  llm_openai: ^0.1.0
  stt_azure: ^0.1.0
  tts_azure: ^0.1.0
  sts_volcengine: ^0.1.0
  ast_volcengine: ^0.1.0
  sts_polychat: ^0.1.0
  ast_polychat: ^0.1.0
  translation_deepl: ^0.1.0
  translation_aliyun: ^0.1.0
  mcp: ^0.1.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agents_server
        pluginClass: AgentsServerPlugin
      ios:
        pluginClass: AgentsServerPlugin
      web:
        pluginClass: AgentsServerWeb
        fileName: agents_server_web.dart
