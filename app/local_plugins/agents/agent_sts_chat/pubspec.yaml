name: agent_sts_chat
description: STS chat agent plugin - end-to-end realtime voice conversation via WebSocket (native)
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agent_sts_chat
        pluginClass: StsChatAgentFlutterPlugin
      web:
        pluginClass: AgentStsChatWeb
        fileName: agent_sts_chat_web.dart
