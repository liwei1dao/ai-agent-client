name: agent_chat
description: Chat agent plugin - orchestrates STT + LLM + TTS pipeline (native)
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agent_chat
        pluginClass: ChatAgentFlutterPlugin
      web:
        pluginClass: AgentChatWeb
        fileName: agent_chat_web.dart
