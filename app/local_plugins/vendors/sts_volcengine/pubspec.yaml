name: sts_volcengine
description: Volcengine end-to-end Speech-to-Speech plugin
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.sts_volcengine
        pluginClass: StsVolcenginePlugin
      web:
        pluginClass: StsVolcengineWeb
        fileName: sts_volcengine_web.dart

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  web: ^1.0.0
  web_socket_channel: ^3.0.0
  archive: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
