name: translation_azure
description: Microsoft / Azure Translator translation plugin (Dart + Native)
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.translation_azure
        pluginClass: TranslationAzurePlugin
      ios:
        pluginClass: TranslationAzurePlugin
      web:
        pluginClass: TranslationAzureWeb
        fileName: translation_azure_web.dart
