name: ast_polychat
description: PolyChat end-to-end Audio-Speech-Translation plugin via WebRTC
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.ast_polychat
        pluginClass: AstPolychatPlugin
      web:
        pluginClass: AstPolychatWeb
        fileName: ast_polychat_web.dart

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  web: ^1.0.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
