name: stt_azure
description: Azure Speech-to-Text plugin
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  web: ^1.0.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.stt_azure
        pluginClass: SttAzurePlugin
      ios:
        pluginClass: SttAzurePlugin
      web:
        pluginClass: SttAzureWeb
        fileName: stt_azure_web.dart
