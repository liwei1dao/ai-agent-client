name: mcp
description: MCP (Model Context Protocol) client. Ships Streamable HTTP transport (MCP 2024-11-05); legacy SSE transport can be added later.
publish_to: http://localhost:4000
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface: ^0.1.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.mcp
        pluginClass: McpFlutterPlugin
      web:
        pluginClass: McpWeb
        fileName: mcp_web.dart
