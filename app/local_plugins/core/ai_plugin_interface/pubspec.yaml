name: ai_plugin_interface
description: Shared abstract interfaces and data classes for AI plugins (Dart + Native)
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.plugin_interface
        pluginClass: AiPluginInterfacePlugin
      web:
        pluginClass: AiPluginInterfaceWeb
        fileName: ai_plugin_interface_web.dart
