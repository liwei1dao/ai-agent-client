name: agent_sts_chat
description: STS chat agent plugin - end-to-end realtime voice conversation via WebSocket (native)
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.agent_sts_chat
        pluginClass: StsChatAgentFlutterPlugin
