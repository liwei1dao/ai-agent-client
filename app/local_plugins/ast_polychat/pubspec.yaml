name: ast_polychat
description: PolyChat end-to-end Audio-Speech-Translation plugin via WebRTC
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.ast_polychat
        pluginClass: AstPolychatPlugin
      web:
        pluginClass: AstPolychatWeb
        fileName: ast_polychat_web.dart

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface

dev_dependencies:
  flutter_test:
    sdk: flutter
