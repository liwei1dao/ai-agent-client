name: translation_aliyun
description: Aliyun translation plugin (Dart + Native)
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  http: ^1.3.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.translation_aliyun
        pluginClass: TranslationAliyunPlugin
      web:
        pluginClass: TranslationAliyunWeb
        fileName: translation_aliyun_web.dart
