name: translation_azure
description: Microsoft / Azure Translator translation plugin (Dart + Native)
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ai_plugin_interface:
    path: ../ai_plugin_interface
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.aiagent.translation_azure
        pluginClass: TranslationAzurePlugin
      web:
        pluginClass: TranslationAzureWeb
        fileName: translation_azure_web.dart
