<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 Agent — 通话模式 — AI Agent UI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="single-page">

<svg style="display:none" aria-hidden="true">
  <symbol id="ic-agents" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="8" width="16" height="11" rx="3"/><circle cx="9" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="13" r="1.5" fill="currentColor" stroke="none"/><path d="M12 2v3M9 8V6a3 3 0 0 1 6 0v2M8 19v2M16 19v2"/>
  </symbol>
  <symbol id="ic-services" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
  </symbol>
  <symbol id="ic-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/><path d="M12 1v3m0 16v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M1 12h3m16 0h3M4.22 19.78l2.12-2.12m13.44-13.44 2.12 2.12"/>
  </symbol>
</svg>

<a href="index.html" class="back-link">&#8249; 返回总览</a>
<div class="page-header">
  <h1>聊天 Agent — 通话模式</h1>
  <p>点右侧 📞 进入 · VAD 自动触发 · 可打断</p>
</div>

<div class="phone-frame">
  <div class="phone-shell">
    <div class="phone-screen">
          <div class="status-bar"><span class="time">9:41</span><div class="status-icons">📶 🔋</div></div>
          <div class="agent-top-bar">
            <div style="font-size:20px;cursor:pointer;color:var(--text-2);">&#8249;</div>
            <div class="agent-avatar">🤖</div>
            <div class="agent-top-info">
              <div class="agent-top-name">通用助手</div>
              <div class="agent-top-status">通话中</div>
            </div>
            <div class="icon-btn">⋯</div>
          </div>
          <div class="service-chips">
            <div class="s-chip llm"><div class="dot"></div>GPT-4o</div>
            <div class="s-chip stt"><div class="dot"></div>Azure STT</div>
            <div class="s-chip tts"><div class="dot"></div>晓晓</div>
          </div>
          <div class="chat-area">
            <div class="msg ai">
              <div class="msg-sender"><div class="msg-avatar">🤖</div> 通用助手</div>
              <div class="bubble ai">你好！通话模式下我们可以自由对话，无需按任何按钮。</div>
              <div class="msg-time">09:40</div>
            </div>
            <div class="msg user">
              <div class="msg-sender">你（语音）</div>
              <div class="bubble user">Flutter 有什么优势？</div>
              <div class="msg-time">09:41</div>
            </div>
            <div class="msg ai">
              <div class="msg-sender"><div class="msg-avatar">🤖</div> GPT-4o</div>
              <div class="bubble ai streaming">Flutter 的核心优势在于跨平台能力强、渲染性能高，以及 Dart 语言的高效开发体验...</div>
              <div class="msg-time">09:41</div>
            </div>
          </div>
          <div class="tts-strip">
            <div class="wave">
              <span style="background:#16A34A;"></span><span style="background:#16A34A;"></span>
              <span style="background:#16A34A;"></span><span style="background:#16A34A;"></span>
              <span style="background:#16A34A;"></span>
            </div>
            <span style="font-size:11px;font-weight:600;color:#16A34A;flex:1;">晓晓正在朗读...</span>
            <div class="interrupt-btn" style="background:#FFF1F0;color:#CF1322;border:1px solid #FFA39E;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              打断
            </div>
          </div>
          <div class="call-bar">
            <div class="call-dot"></div>
            <div class="call-info">
              <div class="call-label">通话中</div>
              <div class="call-timer">01:23</div>
            </div>
            <div style="width:40px;height:40px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;cursor:pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v4M8 23h8"/>
              </svg>
            </div>
            <div class="hangup-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
              </svg>
            </div>
          </div>
          <div class="bottom-nav">
            <div class="nav-item active"><div class="nav-icon"><svg><use href="#ic-agents"/></svg></div><div class="nav-label" style="color:var(--primary);">Agents</div><div class="nav-dot"></div></div>
            <div class="nav-item"><div class="nav-icon"><svg><use href="#ic-services"/></svg></div><div class="nav-label">服务</div></div>
            <div class="nav-item"><div class="nav-icon"><svg><use href="#ic-settings"/></svg></div><div class="nav-label">设置</div></div>
          </div>
    </div>
  </div>
</div>
</body>
</html>
