<div class="page-header"><h1>STS 连接测试</h1><p>WebSocket · 实时音频 · 端到端</p></div>

            <span style="font-size:18px;color:#6B7280;cursor:pointer;">&#8249;</span>
            <div style="flex:1;"><div style="font-size:16px;font-weight:700;color:#1A1A2E;">STS 测试</div><div style="font-size:11px;color:#6B7280;">语音到语音 · 端到端</div></div>
            <div style="display:flex;align-items:center;gap:4px;padding:3px 8px;background:#ECFDF5;border-radius:10px;font-size:10px;font-weight:700;color:#065F46;">
              <span style="width:6px;height:6px;border-radius:50%;background:#10B981;"></span>已连接
            </div>
          </div>

          <div style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;">

            <div class="demo-card">
              <div class="demo-card-title">选择服务</div>
              <div class="demo-row">

                <div class="demo-btn-sm red" style="flex:1;justify-content:center;">⏹ 断开</div>
              </div>
            </div>

            <!-- 连接信息 -->
            <div style="background:#ECFDF5;border:1px solid #86EFAC;border-radius:12px;padding:12px;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                <span style="width:10px;height:10px;border-radius:50%;background:#10B981;animation:pulse-dot 1.5s infinite;"></span>
                <span style="font-size:12px;color:#065F46;font-weight:700;">WebSocket 已连接</span>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;">
                <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:6px 8px;">
                  <div style="color:#6B7280;">延迟</div>
                  <div style="color:#065F46;font-weight:700;font-size:14px;">42ms</div>
                </div>
                <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:6px 8px;">
                  <div style="color:#6B7280;">连接时长</div>
                  <div style="color:#065F46;font-weight:700;font-size:14px;">02:15</div>
                </div>
                <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:6px 8px;">
                  <div style="color:#6B7280;">音频格式</div>
                  <div style="color:#065F46;font-weight:700;">PCM 16kHz</div>
                </div>
                <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:6px 8px;">
                  <div style="color:#6B7280;">音色</div>
                  <div style="color:#065F46;font-weight:700;">天美女声</div>
                </div>
              </div>
            </div>

            <!-- 音频流可视化 -->
            <div class="demo-card">
              <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;">音频流</div>
              <!-- 用户输入 -->
              <div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:8px 10px;margin-bottom:8px;">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                  <span style="font-size:10px;color:#92400E;font-weight:700;">📥 用户语音输入</span>
                  <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
                </div>
                <div style="height:24px;background:rgba(245,158,11,0.1);border-radius:4px;display:flex;align-items:center;padding:0 6px;gap:1px;">

                  <div style="width:2px;height:14px;background:#D97706;border-radius:1px;"></div>

                  <div style="width:2px;height:8px;background:#D97706;border-radius:1px;"></div>
                  <div style="width:2px;height:20px;background:#D97706;border-radius:1px;"></div>
                  <div style="width:2px;height:10px;background:#D97706;border-radius:1px;"></div>
                  <div style="width:2px;height:14px;background:#D97706;border-radius:1px;"></div>
                  <div style="width:2px;height:6px;background:#D97706;border-radius:1px;"></div>
                </div>
              </div>
              <!-- AI 输出 -->
              <div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:8px 10px;">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                  <span style="font-size:10px;color:#065F46;font-weight:700;">📤 AI 语音回复</span>
                  <div class="wave">
                    <span style="background:#16A34A;"></span><span style="background:#16A34A;"></span>
                    <span style="background:#16A34A;"></span><span style="background:#16A34A;"></span>
                    <span style="background:#16A34A;"></span>
                  </div>
                </div>
                <div style="height:24px;background:rgba(22,163,106,0.1);border-radius:4px;display:flex;align-items:center;padding:0 6px;gap:1px;">
                  <div style="width:2px;height:10px;background:#16A34A;border-radius:1px;"></div>

                  <div style="width:2px;height:6px;background:#16A34A;border-radius:1px;"></div>
                  <div style="width:2px;height:14px;background:#16A34A;border-radius:1px;"></div>

                  <div style="width:2px;height:8px;background:#16A34A;border-radius:1px;"></div>
                </div>
              </div>
            </div>

            <!-- 对话记录 -->
            <div class="demo-card">
              <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;">对话记录（文字转写）</div>
              <div style="display:flex;flex-direction:column;gap:6px;">
                <div style="font-size:11px;"><span style="color:#D97706;font-weight:600;">你:</span> <span style="color:var(--text);">今天天气怎么样？</span></div>

</div></div></div>
